<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EASER">
  <defs>
    <linearGradient id="easerSand" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#b97a1e"/>
      <stop offset="0.55" stop-color="#e0a64b"/>
      <stop offset="1" stop-color="#f3cf86"/>
    </linearGradient>
  </defs>
  <!-- ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#e0a64b" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="250 40" transform="rotate(-35 50 50)"/>
  <!-- seismograph trace morphing into a rising arrow -->
  <path d="M14 52 l4 0 l3 -10 l3 18 l3 -26 l3 30 l3 -16 l3 9 l4 -3"
        fill="none" stroke="#3b3b40" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M44 52 C58 50 70 42 82 28" fill="none" stroke="#3b3b40" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M82 28 l-11 1.5 M82 28 l1.5 11" fill="none" stroke="#3b3b40" stroke-width="3.4" stroke-linecap="round"/>
  <!-- skyline bars -->
  <g fill="url(#easerSand)">
    <rect x="70" y="56" width="3.4" height="12" rx="0.6"/>
    <rect x="75" y="52" width="3.4" height="16" rx="0.6"/>
    <rect x="80" y="58" width="3.4" height="10" rx="0.6"/>
  </g>
  <!-- dunes / flowing earth -->
  <path d="M12 70 C28 62 40 74 54 70 C66 67 76 72 88 68 C84 78 72 84 50 84 C30 84 18 79 12 70 Z" fill="url(#easerSand)"/>
  <path d="M16 76 C30 71 42 79 56 75" fill="none" stroke="#f3cf86" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
</svg>
